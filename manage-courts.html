<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Courts | IIUM Sports Court Booking</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="manage-courts">
  <header class="site-header">
    <nav class="navbar container" aria-label="Main navigation">
      <a class="brand" href="index.html"><span class="brand-mark">IB</span><span>IIUM Sports Court Booking</span></a>
      <button class="nav-toggle" type="button" aria-label="Open navigation" aria-expanded="false">Menu</button>
      <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="courts.html">Courts</a>
        <a href="booking.html">Book</a>
        <a href="my-bookings.html">My Bookings</a>
        <a href="admin-dashboard.html">Admin</a>
        <a href="login.html" class="btn btn-small">Login</a>
      </div>
    </nav>
  </header>

  <main class="page-main">
    <section class="container">
      <div class="page-heading">
        <p class="eyebrow">Admin area</p>
        <h1>Manage Courts</h1>
        <p class="muted">Add, edit, or delete mock COURT records.</p>
      </div>

      <div class="admin-layout">
        <form class="form-card" id="courtForm">
          <h2 id="courtFormTitle">Add Court</h2>
          <div class="form-message" id="courtMessage" aria-live="polite"></div>
          <input type="hidden" id="courtId">

          <label for="courtName">Court Name</label>
          <input type="text" id="courtName" required placeholder="Badminton Court A">

          <label for="courtTypeId">Court Type</label>
          <select id="courtTypeId" required></select>

          <label for="courtLocation">Location</label>
          <input type="text" id="courtLocation" required placeholder="Sports Complex Block A">

          <label for="courtStatus">Status</label>
          <select id="courtStatus" required>
            <option value="Available">Available</option>
            <option value="Unavailable">Unavailable</option>
          </select>

          <label for="pricePerHour">Price Per Hour</label>
          <input type="number" id="pricePerHour" value="10" min="1" required>

          <div class="button-row">
            <button type="submit" class="btn btn-primary">Save Court</button>
            <button type="button" class="btn btn-secondary" id="resetCourtForm">Clear</button>
          </div>
        </form>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Court ID</th>
                <th>Name</th>
                <th>Type</th>
                <th>Location</th>
                <th>Status</th>
                <th>Price</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="manageCourtsTable"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>&copy; 2026 IIUM Sports Court Booking</p>
      <p>COURT records are saved in localStorage.</p>
    </div>
  </footer>

  <script src="js/clerk-config.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
